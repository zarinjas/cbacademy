name: Deploy to production via SSH

# Simple deploy: sync repo to remote server, install nginx snippet, and reload nginx.
# REQUIRED repository secrets:
# - SSH_HOST: server host or IP
# - SSH_USER: ssh username
# - SSH_PRIVATE_KEY: private key content (no passphrase recommended for CI)
# - REMOTE_PATH: path on remote where the app should be deployed (e.g. /var/www/app)
# Optional:
# - SSH_PORT (default 22)
# - PROD_ENV_FILE (base64 encoded content of production .env) — if provided, it will be written to REMOTE_PATH/.env

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Preflight checks on remote host
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            echo "Running remote preflight checks..."
            REMOTE_PATH='${{ secrets.REMOTE_PATH }}'
            if [ -z "$REMOTE_PATH" ]; then
              echo 'ERROR: REMOTE_PATH secret is empty'; exit 1
            fi
            if [ ! -d "$REMOTE_PATH" ]; then
              echo "ERROR: remote path $REMOTE_PATH does not exist"; exit 1
            fi
            if [ ! -w "$REMOTE_PATH" ]; then
              echo "ERROR: remote path $REMOTE_PATH is not writable by ${{ secrets.SSH_USER }}"; exit 1
            fi
            # Check videos directory
            if [ ! -d "$REMOTE_PATH/storage/app/videos" ]; then
              echo "ERROR: videos directory $REMOTE_PATH/storage/app/videos not found"; exit 1
            fi
            echo "Preflight checks passed."

      - name: Sync repository to server (rsync)
        uses: burnett01/rsync-deploy@v4
        with:
          switches: -avz --delete --exclude='.git' --exclude='node_modules' --exclude='storage/app/videos'
          path: .
          remote_path: ${{ secrets.REMOTE_PATH }}
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh_port: ${{ secrets.SSH_PORT || '22' }}

      - name: Copy nginx snippet to server (temporary location)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: docs/nginx/protected_videos.conf
          target: /tmp/protected_videos.conf

      - name: Install nginx snippet, backup existing, and reload nginx
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            # Backup existing snippet if present
            if [ -f /etc/nginx/snippets/protected_videos.conf ]; then
              sudo cp /etc/nginx/snippets/protected_videos.conf /etc/nginx/snippets/protected_videos.conf.bak.$(date +%s)
            fi
            # Try to copy into snippets, fallback to conf.d
            if sudo test -d /etc/nginx/snippets; then
              sudo cp /tmp/protected_videos.conf /etc/nginx/snippets/protected_videos.conf
            else
              sudo cp /tmp/protected_videos.conf /etc/nginx/conf.d/protected_videos.conf
            fi
            sudo nginx -t
            sudo systemctl reload nginx

      - name: (Optional) Write production .env from secret (base64 encoded)
        if: ${{ secrets.PROD_ENV_FILE != '' }}
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            echo "Writing .env to ${{ secrets.REMOTE_PATH }}"
            base64 -d <<< "${{ secrets.PROD_ENV_FILE }}" | sudo tee ${{ secrets.REMOTE_PATH }}/.env > /dev/null
            sudo chown ${{ secrets.SSH_USER }}: ${{ secrets.REMOTE_PATH }}/.env

      - name: (Optional) Restart PHP-FPM
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            # Adjust service name to your PHP-FPM version if needed
            sudo systemctl restart php8.1-fpm || sudo systemctl restart php-fpm || true
